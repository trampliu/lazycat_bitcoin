lzc-sdk-version: "0.1"
name: Bitcoin Core
package: cloud.lazycat.app.trampliu-bitcoin-core
version: 0.1.0
description: Bitcoin Core full node (bitcoind)
usage: 首次启动会进行区块同步，耗时较长。请保持后台运行并预留足够磁盘空间。
license: MIT
homepage: https://github.com/bitcoin/bitcoin
author: trampliu
min_os_version: 1.3.0

application:
  background_task: true

services:
  bitcoind:
    image: trampliu/lazycat-bitcoin:latest
    container_name: bitcoind
    restart: unless-stopped
    command: >
      -printtoconsole
      -server=1
      -datadir=/home/bitcoin/.bitcoin
    binds:
      - /lzcapp/var/bitcoin:/home/bitcoin/.bitcoin
    ports:
      - 8333:8333
    healthcheck:
      test: ["CMD-SHELL", "bitcoin-cli -datadir=/home/bitcoin/.bitcoin -rpcwait getblockchaininfo >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
